<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cashbook</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f6f3; --surface: #ffffff;
      --border: rgba(0,0,0,0.08); --border-md: rgba(0,0,0,0.14);
      --text: #1a1a18; --text-sub: #6b6b68; --text-hint: #a8a8a4;
      --green: #1D9E75; --green-bg: #E1F5EE;
      --red: #E24B4A; --red-bg: #FCEBEB;
      --orange: #EF9F27; --orange-bg: #FAEEDA;
      --blue: #378ADD; --radius: 12px; --radius-sm: 8px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18; --surface: #242422;
        --border: rgba(255,255,255,0.08); --border-md: rgba(255,255,255,0.14);
        --text: #f0efe9; --text-sub: #9a9a96; --text-hint: #5a5a57;
        --green-bg: #04342C; --red-bg: #501313; --orange-bg: #412402;
      }
    }
    body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 480px; margin: 0 auto; }
    .header { margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: flex-start; }
    .header-left h1 { font-size: 22px; font-weight: 600; }
    .header-left p { font-size: 13px; color: var(--text-sub); margin-top: 3px; }
    .settings-btn { background: none; border: 0.5px solid var(--border-md); border-radius: var(--radius-sm); padding: 7px 12px; font-size: 13px; color: var(--text-sub); cursor: pointer; font-family: inherit; }
    .settings-btn:hover { background: var(--surface); }
    .settings-panel { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1.5rem; display: none; }
    .settings-panel.open { display: block; }
    .settings-title { font-size: 14px; font-weight: 600; margin-bottom: 1rem; }
    .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
    .settings-field label { font-size: 11px; color: var(--text-sub); display: block; margin-bottom: 4px; }
    .settings-field input { width: 100%; background: var(--bg); border: 0.5px solid var(--border-md); border-radius: var(--radius-sm); padding: 8px 10px; font-size: 14px; font-family: inherit; color: var(--text); outline: none; }
    .settings-field input:focus { border-color: var(--blue); }
    .settings-field.full { grid-column: 1 / -1; }
    .save-btn { width: 100%; background: var(--text); color: var(--bg); border: none; border-radius: var(--radius-sm); padding: 10px; font-size: 14px; font-family: inherit; font-weight: 500; cursor: pointer; }
    .save-btn:hover { opacity: 0.8; }
    .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 0.5rem; }
    .metric { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px; }
    .metric-label { font-size: 11px; color: var(--text-sub); margin-bottom: 4px; }
    .metric-value { font-size: 15px; font-weight: 600; }
    .metric-value span.metric-total { font-size: 12px; font-weight: 400; color: var(--text-hint); }
    .donut-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.25rem; display: flex; align-items: center; gap: 1.5rem; margin-bottom: 1rem; }
    .donut-wrap { position: relative; width: 100px; height: 100px; flex-shrink: 0; }
    .donut-wrap canvas { width: 100px; height: 100px; }
    .donut-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; }
    .donut-pct { font-size: 18px; font-weight: 600; }
    .donut-sub { font-size: 10px; color: var(--text-sub); margin-top: 1px; }
    .donut-info { flex: 1; display: flex; flex-direction: column; gap: 10px; }
    .info-row { display: flex; justify-content: space-between; align-items: baseline; }
    .info-label { font-size: 13px; color: var(--text-sub); }
    .info-val { font-size: 15px; font-weight: 600; min-width: 90px; text-align: right; }
    .val-spent { color: var(--red); }
    .val-remain { color: var(--green); }
    .val-over { color: var(--red); }
    .status-card { border-radius: var(--radius); padding: 14px 16px; margin-bottom: 0.75rem; border: 0.5px solid transparent; display: flex; align-items: center; gap: 8px; }
    .status-card.good { background: var(--green-bg); }
    .status-card.bad { background: var(--red-bg); }
    .status-card.warn { background: var(--orange-bg); }
    .status-card.neutral { background: var(--surface); border-color: var(--border); }
    .status-card-icon { font-size: 20px; line-height: 1; flex-shrink: 0; width: 24px; text-align: center; }
    .status-card-body { flex: 1; }
    .status-card-label { font-size: 12px; font-weight: 500; margin-bottom: 2px; }
    .status-card-label.good { color: var(--green); }
    .status-card-label.bad { color: var(--red); }
    .status-card-label.warn { color: var(--orange); }
    .status-card-label.neutral { color: var(--text-sub); }
    .status-card-text { font-size: 15px; font-weight: 600; color: var(--text); }
    .status-card-sub { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
    .reserve-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 1.25rem; }
    .reserve-card-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
    .reserve-card-title { font-size: 13px; font-weight: 500; color: var(--text-sub); }
    .reserve-card-amount { font-size: 15px; font-weight: 600; }
    .reserve-card-amount.ok { color: var(--green); }
    .reserve-card-amount.low { color: var(--orange); }
    .reserve-card-amount.empty { color: var(--red); }
    .bar-track { background: var(--border); border-radius: 99px; height: 8px; overflow: hidden; margin-bottom: 8px; }
    .bar-fill { height: 100%; border-radius: 99px; transition: width 0.5s ease; }
    .bar-fill.ok { background: var(--green); }
    .bar-fill.low { background: var(--orange); }
    .bar-fill.empty { background: var(--red); }
    .bar-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-hint); }
    hr { border: none; border-top: 0.5px solid var(--border); margin: 1.25rem 0; }
    .section-label { font-size: 13px; font-weight: 500; color: var(--text-sub); margin-bottom: 10px; }
    .input-row { display: grid; grid-template-columns: 1fr 80px 52px; gap: 6px; margin-bottom: 1.25rem; }
    input[type="text"], input[type="number"] { background: var(--surface); border: 0.5px solid var(--border-md); border-radius: var(--radius-sm); padding: 9px 10px; font-size: 14px; font-family: inherit; color: var(--text); outline: none; width: 100%; min-width: 0; }
    .add-btn { padding: 9px 8px; font-size: 13px; }
    input::placeholder { color: var(--text-hint); }
    input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(55,138,221,0.12); }
    .add-btn { background: var(--text); color: var(--bg); border: none; border-radius: var(--radius-sm); padding: 9px 16px; font-size: 14px; font-family: inherit; font-weight: 500; cursor: pointer; white-space: nowrap; }
    .add-btn:hover { opacity: 0.8; }
    .add-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .list-title { font-size: 13px; font-weight: 500; color: var(--text-sub); }
    .list-total { font-size: 13px; font-weight: 600; }
    .expense-list { display: flex; flex-direction: column; gap: 6px; }
    .expense-item { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 11px 14px; display: flex; align-items: center; justify-content: space-between; }
    .item-left { display: flex; align-items: center; gap: 10px; }
    .item-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--blue); flex-shrink: 0; }
    .item-name { font-size: 14px; }
    .item-time { font-size: 11px; color: var(--text-hint); margin-top: 1px; }
    .item-right { display: flex; align-items: center; gap: 10px; }
    .item-amount { font-size: 14px; font-weight: 600; }
    .del-btn { background: none; border: none; cursor: pointer; color: var(--text-hint); font-size: 16px; padding: 2px 4px; border-radius: 4px; }
    .del-btn:hover { color: var(--red); background: var(--red-bg); }
    .empty { text-align: center; padding: 2rem; font-size: 14px; color: var(--text-hint); }
    .status { font-size: 12px; color: var(--text-hint); text-align: center; margin-top: 1.5rem; }
    .status.error { color: var(--red); }
    .loading-overlay { display: none; }
  </style>
</head>
<body>
<div class="loading-overlay" id="loadingOverlay">불러오는 중...</div>
<div class="container">
  <div class="header">
    <div class="header-left">
      <h1>Cashbook</h1>
      <p id="todayDate"></p>
    </div>
    <button class="settings-btn" onclick="toggleSettings()">⚙ 예산 설정</button>
  </div>

  <div class="settings-panel" id="settingsPanel">
    <div class="settings-title">예산 설정</div>
    <div class="settings-grid">
      <div class="settings-field">
        <label>월급 (원)</label>
        <input type="number" id="set-salary" />
      </div>
      <div class="settings-field">
        <label>고정지출 (원)</label>
        <input type="number" id="set-fixed" />
      </div>
      <div class="settings-field">
        <label>월 사용 예산 (원)</label>
        <input type="number" id="set-monthly" />
      </div>
      <div class="settings-field">
        <label>하루 예산 (원)</label>
        <input type="number" id="set-daily" />
      </div>
      <div class="settings-field full">
        <label>예비비 (자동계산: 월급 - 고정지출 - 월 예산)</label>
        <input type="text" id="set-reserve" readonly style="opacity:0.6;cursor:default;" />
      </div>
    </div>
    <button class="save-btn" onclick="saveSettings()">저장하기</button>
  </div>

  <div class="metrics">
    <div class="metric"><div class="metric-label">하루 예산</div><div class="metric-value" id="m-daily">-</div></div>
    <div class="metric"><div class="metric-label">월 예산</div><div class="metric-value" id="m-monthly">-<span class="metric-total" id="m-monthly-total"></span></div></div>
    <div class="metric"><div class="metric-label">예비비</div><div class="metric-value" id="m-reserve">-<span class="metric-total" id="m-reserve-total"></span></div></div>
  </div>

  <div class="donut-card">
    <div class="donut-wrap">
      <canvas id="donutCanvas" width="100" height="100"></canvas>
      <div class="donut-center">
        <div class="donut-pct" id="pctText">0%</div>
        <div class="donut-sub">사용률</div>
      </div>
    </div>
    <div class="donut-info">
      <div class="info-row"><span class="info-label">오늘 사용</span><span class="info-val val-spent" id="spentVal">0원</span></div>
      <div class="info-row"><span class="info-label">하루 예산</span><span class="info-val" id="dailyBudgetVal">-</span></div>
      <div class="info-row"><span class="info-label" id="remainLabel">남은 금액</span><span class="info-val val-remain" id="remainVal">-</span></div>
    </div>
  </div>

  <div class="status-card good" id="commentCard">
    <div class="status-card-icon" id="commentIcon">🟢</div>
    <div class="status-card-body">
      <div class="status-card-label good" id="commentLabel">오늘 현황</div>
      <div class="status-card-text" id="commentText">오늘 40,000원 남았어요!</div>
    </div>
  </div>
  <div class="status-card neutral" id="summaryBox">
    <div class="status-card-icon" id="summaryIcon">⚪</div>
    <div class="status-card-body">
      <div class="status-card-label neutral" id="summaryToday">월 예산 영향</div>
      <div class="status-card-text" id="summaryMain">완벽해요! 예산 그대로 유지</div>
      <div class="status-card-sub" id="summarySub">내일도 하루 40,000원</div>
    </div>
  </div>
  <hr />
  <div class="section-label">지출 추가</div>
  <div class="input-row">
    <input type="text" id="expenseName" placeholder="내용 (예: 점심식사)" />
    <input type="number" id="expenseAmount" placeholder="금액" min="0" step="100" />
    <button class="add-btn" id="addBtn" onclick="addExpense()">추가</button>
  </div>
  <div class="list-header">
    <span class="list-title" id="listTitle">오늘 지출 내역</span>
    <span class="list-total" id="listTotal"></span>
  </div>
  <div class="expense-list" id="expenseList">
    <div class="empty">아직 지출 내역이 없어요</div>
  </div>
  <hr />
  <div class="reserve-card">
    <div class="reserve-card-header">
      <span class="reserve-card-title">예비비 잔액</span>
      <span class="reserve-card-amount ok" id="reserveRemainAmt">-</span>
    </div>
    <div class="bar-track">
      <div class="bar-fill ok" id="reserveBar" style="width:100%"></div>
    </div>
    <div class="bar-labels">
      <span>0원</span>
      <span id="reserveTotalAmt">-</span>
    </div>
  </div>
  <div class="section-label">예비비 지출 추가</div>
  <div class="input-row">
    <input type="text" id="reserveName" placeholder="내용 (예: 병원비)" />
    <input type="number" id="reserveAmount" placeholder="금액" min="0" step="100" />
    <button class="add-btn" id="reserveAddBtn" onclick="addReserveExpense()">추가</button>
  </div>
  <div class="list-header">
    <span class="list-title" id="reserveListTitle">예비비 사용내역</span>
    <span class="list-total" id="reserveListTotal"></span>
  </div>
  <div class="expense-list" id="reserveList">
    <div class="empty">아직 사용내역이 없어요</div>
  </div>

  <div class="status" id="statusMsg"></div>
</div>

<script>
// Supabase REST API 직접 호출 (라이브러리 없이)
const SB_URL = 'https://stbbjqeyjmvwepciqxpp.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN0YmJqcWV5am12d2VwY2lxeHBwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxMTM0MzAsImV4cCI6MjA5NTY4OTQzMH0.RPxq3-oOFI2Vx9g2En2xf1b85HdjZA3Kmh6gXQ_aT8Y';

const HEADERS = {
  'apikey': SB_KEY,
  'Authorization': 'Bearer ' + SB_KEY,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};

async function sbSelect(date, type, signal) {
  const url = SB_URL + '/rest/v1/expenses?date=eq.' + date + '&type=eq.' + type + '&order=created_at.asc';
  const res = await fetch(url, { headers: HEADERS, signal });
  return res.json();
}
async function sbSelectMonth(yearMonth, type) {
  // yearMonth: '2026-06' 형태
  const url = SB_URL + '/rest/v1/expenses?date=like.' + yearMonth + '*&type=eq.' + type + '&order=date.desc,created_at.desc';
  const res = await fetch(url, { headers: HEADERS });
  return res.json();
}
async function sbInsert(row) {
  const res = await fetch(SB_URL + '/rest/v1/expenses', { method: 'POST', headers: HEADERS, body: JSON.stringify(row) });
  const data = await res.json();
  return Array.isArray(data) ? data[0] : data;
}
async function sbDelete(id) {
  await fetch(SB_URL + '/rest/v1/expenses?id=eq.' + id, { method: 'DELETE', headers: HEADERS });
}

const TODAY = new Date().toISOString().slice(0, 10);
const THIS_MONTH = TODAY.slice(0, 7); // '2026-06'
let expenses = [];
let reserveExpenses = [];
let monthlyTotal = 0;      // 이번달 일반 지출 누계
let monthlyReserveTotal = 0; // 이번달 예비비 누계

const DEFAULT_SETTINGS = { salary: 4400000, fixed: 2000000, monthly: 1240000, daily: 40000, reserve: 1160000 };
let settings = { ...DEFAULT_SETTINGS };

function loadSettings() {
  try {
    const raw = localStorage.getItem('cashbook_settings');
    if (raw) settings = { ...DEFAULT_SETTINGS, ...JSON.parse(raw) };
  } catch(e) {}
}

function toggleSettings() {
  const panel = document.getElementById('settingsPanel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) {
    document.getElementById('set-salary').value = settings.salary;
    document.getElementById('set-fixed').value = settings.fixed;
    document.getElementById('set-monthly').value = settings.monthly;
    document.getElementById('set-daily').value = settings.daily;
    refreshReserve();
  }
}

function refreshReserve() {
  const s = parseInt(document.getElementById('set-salary').value) || 0;
  const f = parseInt(document.getElementById('set-fixed').value) || 0;
  const m = parseInt(document.getElementById('set-monthly').value) || 0;
  document.getElementById('set-reserve').value = (s - f - m).toLocaleString('ko-KR') + '원';
}

['set-salary','set-fixed','set-monthly'].forEach(id => {
  document.getElementById(id).addEventListener('input', refreshReserve);
});

function saveSettings() {
  const salary = parseInt(document.getElementById('set-salary').value) || settings.salary;
  const fixed = parseInt(document.getElementById('set-fixed').value) || settings.fixed;
  const monthly = parseInt(document.getElementById('set-monthly').value) || settings.monthly;
  const daily = parseInt(document.getElementById('set-daily').value) || settings.daily;
  const reserve = salary - fixed - monthly;
  settings = { salary, fixed, monthly, daily, reserve };
  localStorage.setItem('cashbook_settings', JSON.stringify(settings));
  document.getElementById('settingsPanel').classList.remove('open');
  updateMetrics();
  updateUI();
}

function updateMetrics() {
  document.getElementById('m-daily').textContent = (settings.daily / 10000) + '만원';
  document.getElementById('dailyBudgetVal').textContent = settings.daily.toLocaleString('ko-KR') + '원';
  updateMetricRemain();
}

function updateMetricRemain() {
  const remainMonthly = settings.monthly - monthlyTotal;
  const remainReserve = settings.reserve - monthlyReserveTotal;
  const toMan = n => Math.round(n / 10000).toLocaleString('ko-KR');

  const mEl = document.getElementById('m-monthly');
  const rEl = document.getElementById('m-reserve');

  mEl.childNodes[0].textContent = toMan(remainMonthly) + '만원';
  document.getElementById('m-monthly-total').textContent = '/' + toMan(settings.monthly) + '만원';

  rEl.childNodes[0].textContent = toMan(remainReserve) + '만원';
  document.getElementById('m-reserve-total').textContent = '/' + toMan(settings.reserve) + '만원';
}

const days = ['일','월','화','수','목','금','토'];
const now = new Date();
document.getElementById('todayDate').textContent = now.getFullYear() + '년 ' + (now.getMonth()+1) + '월 ' + now.getDate() + '일 (' + days[now.getDay()] + ')';

function fmt(n) { return Math.abs(n).toLocaleString('ko-KR') + '원'; }

function setStatus(msg, isError) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = 'status' + (isError ? ' error' : '');
  if (msg && !isError) setTimeout(() => { el.textContent = ''; }, 2000);
}

function drawDonut(pct) {
  const canvas = document.getElementById('donutCanvas');
  const ctx = canvas.getContext('2d');
  const cx = 50, cy = 50, r = 38, sw = 9;
  const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
  ctx.clearRect(0, 0, 100, 100);
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, 2 * Math.PI);
  ctx.strokeStyle = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.07)';
  ctx.lineWidth = sw; ctx.stroke();
  if (pct > 0) {
    ctx.beginPath();
    ctx.arc(cx, cy, r, -Math.PI/2, -Math.PI/2 + Math.min(pct/100,1)*2*Math.PI);
    ctx.strokeStyle = pct >= 100 ? '#E24B4A' : pct >= 80 ? '#EF9F27' : '#1D9E75';
    ctx.lineWidth = sw; ctx.lineCap = 'round'; ctx.stroke();
  }
}

function updateUI() {
  const total = expenses.reduce((s, e) => s + e.amount, 0);
  const pct = Math.round((total / settings.daily) * 100);
  const remain = settings.daily - total;
  document.getElementById('pctText').textContent = pct + '%';
  document.getElementById('spentVal').textContent = fmt(total);
  const remainEl = document.getElementById('remainVal');
  if (remain >= 0) {
    document.getElementById('remainLabel').textContent = '남은 금액';
    remainEl.className = 'info-val val-remain';
    remainEl.textContent = fmt(remain);
  } else {
    document.getElementById('remainLabel').textContent = '초과 금액';
    remainEl.className = 'info-val val-over';
    remainEl.textContent = fmt(Math.abs(remain));
  }
  drawDonut(pct);
  updateSummary(remain, total);
  updateMetricRemain();
  renderList();
}

function updateSummary(remain, total) {
  const box = document.getElementById('summaryBox');
  const icon = document.getElementById('summaryIcon');
  const todayLabel = document.getElementById('summaryToday');
  const main = document.getElementById('summaryMain');
  const sub = document.getElementById('summarySub');
  const commentCard = document.getElementById('commentCard');
  const commentIcon = document.getElementById('commentIcon');
  const commentLabel = document.getElementById('commentLabel');
  const commentText = document.getElementById('commentText');

  const end = new Date('2026-06-30');
  const today = new Date(TODAY);
  const remainDays = Math.round((end - today) / 86400000);
  // 남은 월예산 = 전체 월예산 - 이번달 누적 지출
  const remainMonthly = settings.monthly - monthlyTotal;
  const newDaily = remainDays > 0 ? Math.round(remainMonthly / remainDays) : 0;
  const diff = newDaily - settings.daily;

  // 첫번째 박스: 오늘 현황
  if (total === 0) {
    commentCard.className = 'status-card neutral';
    commentIcon.textContent = '💰';
    commentLabel.className = 'status-card-label neutral';
    commentLabel.textContent = '오늘 현황';
    commentText.textContent = '아직 지출이 없어요. 하루 예산 ' + fmt(settings.daily);
  } else if (remain >= 0) {
    commentCard.className = 'status-card good';
    commentIcon.textContent = '🟢';
    commentLabel.className = 'status-card-label good';
    commentLabel.textContent = '오늘 현황';
    commentText.textContent = '오늘 ' + fmt(remain) + ' 남았어요!';
  } else {
    commentCard.className = 'status-card bad';
    commentIcon.textContent = '🔴';
    commentLabel.className = 'status-card-label bad';
    commentLabel.textContent = '오늘 현황';
    commentText.textContent = '오늘 ' + fmt(Math.abs(remain)) + ' 초과했어요 😅';
  }

  // 두번째 박스: 월 예산 영향
  todayLabel.textContent = '월 예산 영향';
  if (diff > 0) {
    box.className = 'status-card good';
    icon.textContent = '📈';
    todayLabel.className = 'status-card-label good';
    main.textContent = '내일부터 하루 ' + newDaily.toLocaleString('ko-KR') + '원까지 OK';
    sub.textContent = '기존 대비 +' + diff.toLocaleString('ko-KR') + '원 여유 생겼어요';
  } else if (diff < 0) {
    box.className = 'status-card bad';
    icon.textContent = '📉';
    todayLabel.className = 'status-card-label bad';
    main.textContent = '내일부터 하루 ' + newDaily.toLocaleString('ko-KR') + '원으로 줄여야 해요';
    sub.textContent = '기존 대비 ' + diff.toLocaleString('ko-KR') + '원 줄었어요';
  } else {
    box.className = 'status-card neutral';
    icon.textContent = '⚪';
    todayLabel.className = 'status-card-label neutral';
    main.textContent = '예산 그대로 유지!';
    sub.textContent = '내일도 하루 ' + settings.daily.toLocaleString('ko-KR') + '원';
  }

  updateReserveBar();
  updateMetricRemain();
}

function updateReserveBar() {
  const used = monthlyReserveTotal;
  const total = settings.reserve;
  const remain = total - used;
  const pct = Math.max(0, Math.min(100, Math.round((remain / total) * 100)));

  const amtEl = document.getElementById('reserveRemainAmt');
  const barEl = document.getElementById('reserveBar');
  const totalEl = document.getElementById('reserveTotalAmt');

  if (!amtEl) return;

  totalEl.textContent = total.toLocaleString('ko-KR') + '원';
  amtEl.textContent = fmt(remain) + ' 남음';

  const state = pct > 50 ? 'ok' : pct > 20 ? 'low' : 'empty';
  amtEl.className = 'reserve-card-amount ' + state;
  barEl.className = 'bar-fill ' + state;
  barEl.style.width = pct + '%';
}

function renderList() {
  const list = document.getElementById('expenseList');
  const total = expenses.reduce((s, e) => s + e.amount, 0);
  document.getElementById('listTitle').textContent = '오늘 지출 내역 (' + expenses.length + '건)';
  document.getElementById('listTotal').textContent = total > 0 ? fmt(total) : '';
  if (expenses.length === 0) { list.innerHTML = '<div class="empty">아직 지출 내역이 없어요</div>'; return; }
  list.innerHTML = expenses.slice().reverse().map(e =>
    '<div class="expense-item"><div class="item-left"><div class="item-dot"></div><div><div class="item-name">' + e.name + '</div><div class="item-time">' + e.time + '</div></div></div><div class="item-right"><div class="item-amount">' + fmt(e.amount) + '</div><button class="del-btn" onclick="deleteExpense(' + e.id + ')">✕</button></div></div>'
  ).join('');
}

async function loadExpenses() {
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 5000);
    const [d1, d2, m1, m2] = await Promise.all([
      sbSelect(TODAY, 'daily', controller.signal),
      sbSelect(TODAY, 'reserve', controller.signal),
      sbSelectMonth(THIS_MONTH, 'daily'),
      sbSelectMonth(THIS_MONTH, 'reserve')
    ]);
    clearTimeout(timeout);
    if (Array.isArray(d1)) expenses = d1.map(r => ({ id: r.id, name: r.name, amount: r.amount, time: r.time }));
    // 예비비는 이번달 전체 내역으로 표시
    if (Array.isArray(m2)) {
      reserveExpenses = m2.map(r => ({ id: r.id, name: r.name, amount: r.amount, time: r.time, date: r.date }));
      monthlyReserveTotal = m2.reduce((s, r) => s + r.amount, 0);
    }
    if (Array.isArray(m1)) monthlyTotal = m1.reduce((s, r) => s + r.amount, 0);
  } catch(e) {
    setStatus('불러오기 실패: ' + e.message, true);
  }
  updateUI();
  renderReserveList();
}

async function addExpense() {
  const nameEl = document.getElementById('expenseName');
  const amountEl = document.getElementById('expenseAmount');
  const btn = document.getElementById('addBtn');
  const name = nameEl.value.trim();
  const amount = parseInt(amountEl.value, 10);
  if (!name || isNaN(amount) || amount <= 0) { nameEl.focus(); return; }
  const t = new Date();
  const time = t.getHours().toString().padStart(2,'0') + ':' + t.getMinutes().toString().padStart(2,'0');
  btn.disabled = true;
  try {
    const row = await sbInsert({ name, amount, date: TODAY, time, type: 'daily' });
    expenses.push({ id: row.id, name, amount, time });
    monthlyTotal += amount;
    nameEl.value = ''; amountEl.value = ''; nameEl.focus();
    setStatus('저장됨 ✓');
    updateUI();
  } catch(e) {
    setStatus('저장 실패: ' + e.message, true);
  }
  btn.disabled = false;
}

async function deleteExpense(id, isReserve) {
  try {
    await sbDelete(id);
    if (isReserve) {
      const e = reserveExpenses.find(e => e.id === id);
      if (e) monthlyReserveTotal -= e.amount;
      reserveExpenses = reserveExpenses.filter(e => e.id !== id);
      renderReserveList();
    } else {
      const e = expenses.find(e => e.id === id);
      if (e) monthlyTotal -= e.amount;
      expenses = expenses.filter(e => e.id !== id);
      updateUI();
    }
    setStatus('삭제됨 ✓');
  } catch(e) {
    setStatus('삭제 실패: ' + e.message, true);
  }
}

async function addReserveExpense() {
  const nameEl = document.getElementById('reserveName');
  const amountEl = document.getElementById('reserveAmount');
  const btn = document.getElementById('reserveAddBtn');
  const name = nameEl.value.trim();
  const amount = parseInt(amountEl.value, 10);
  if (!name || isNaN(amount) || amount <= 0) { nameEl.focus(); return; }
  const t = new Date();
  const time = t.getHours().toString().padStart(2,'0') + ':' + t.getMinutes().toString().padStart(2,'0');
  btn.disabled = true;
  try {
    const row = await sbInsert({ name, amount, date: TODAY, time, type: 'reserve' });
    reserveExpenses.push({ id: row.id, name, amount, time });
    monthlyReserveTotal += amount;
    nameEl.value = ''; amountEl.value = ''; nameEl.focus();
    setStatus('저장됨 ✓');
    renderReserveList();
  } catch(e) {
    setStatus('저장 실패: ' + e.message, true);
  }
  btn.disabled = false;
}

function renderReserveList() {
  const list = document.getElementById('reserveList');
  const total = reserveExpenses.reduce((s, e) => s + e.amount, 0);
  document.getElementById('reserveListTitle').textContent = '예비비 사용내역 (' + reserveExpenses.length + '건)';
  document.getElementById('reserveListTotal').textContent = total > 0 ? fmt(total) : '';
  if (reserveExpenses.length === 0) { list.innerHTML = '<div class="empty">아직 사용내역이 없어요</div>'; return; }
  list.innerHTML = reserveExpenses.slice().reverse().map(e =>
    '<div class="expense-item"><div class="item-left"><div class="item-dot" style="background:var(--orange)"></div><div><div class="item-name">' + e.name + '</div><div class="item-time">' + (e.date || TODAY) + ' ' + e.time + '</div></div></div><div class="item-right"><div class="item-amount">' + fmt(e.amount) + '</div><button class="del-btn" onclick="deleteExpense(' + e.id + ', true)">✕</button></div></div>'
  ).join('');
  updateReserveBar();
}

document.getElementById('expenseName').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('expenseAmount').focus(); });
document.getElementById('expenseAmount').addEventListener('keydown', e => { if (e.key === 'Enter') addExpense(); });

async function init() {
  loadSettings();
  updateMetrics();
  updateUI();
  renderReserveList();
  loadExpenses();
}

init();
</script>
</body>
</html>
